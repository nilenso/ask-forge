services:
  # Sandbox worker: runs git clone + tools in isolation.
  # See sandbox/Containerfile for security layer details.
  sandbox:
    build:
      context: ./src/sandbox
      dockerfile: Containerfile
    runtime: runsc  # gVisor required for bwrap to work with minimal caps
    cap_drop:
      - ALL
    cap_add:
      - SYS_ADMIN  # For bwrap namespace creation
    security_opt:
      - no-new-privileges
    tmpfs:
      - /tmp:rw,size=64m
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://localhost:8080/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Langfuse observability stack (v3, self-hosted)
  # UI: http://localhost:3000
  # ---------------------------------------------------------------------------

  langfuse-web:
    image: docker.io/langfuse/langfuse:3
    ports:
      - "3000:3000"
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
    environment:
      # Postgres
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      # ClickHouse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      # Redis
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuse-redis-auth
      # Auth / secrets (local dev values — do NOT use in production)
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: my-nextauth-secret-for-dev
      SALT: my-salt-for-dev
      ENCRYPTION_KEY: eaa129cd1f5ef95bd12d59fcf56bddb26063fe18e70803d393b00b3512c21f82
      # S3 / MinIO event storage
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      # S3 / MinIO media storage (reuse same bucket)
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
      # Headless bootstrap — auto-creates org, project, user, and API keys
      LANGFUSE_INIT_ORG_ID: ask-forge
      LANGFUSE_INIT_ORG_NAME: ask-forge
      LANGFUSE_INIT_PROJECT_ID: ask-forge-dev
      LANGFUSE_INIT_PROJECT_NAME: ask-forge-dev
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: lf_pk_ask_forge_dev
      LANGFUSE_INIT_PROJECT_SECRET_KEY: lf_sk_ask_forge_dev
      LANGFUSE_INIT_USER_EMAIL: admin@askforge.local
      LANGFUSE_INIT_USER_NAME: Admin
      LANGFUSE_INIT_USER_PASSWORD: admin123
    restart: unless-stopped

  langfuse-worker:
    image: docker.io/langfuse/langfuse-worker:3
    depends_on:
      langfuse-postgres:
        condition: service_healthy
      langfuse-redis:
        condition: service_healthy
      langfuse-clickhouse:
        condition: service_healthy
      langfuse-minio:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@langfuse-postgres:5432/langfuse
      CLICKHOUSE_MIGRATION_URL: clickhouse://langfuse-clickhouse:9000
      CLICKHOUSE_URL: http://langfuse-clickhouse:8123
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse
      CLICKHOUSE_CLUSTER_ENABLED: "false"
      REDIS_HOST: langfuse-redis
      REDIS_PORT: 6379
      REDIS_AUTH: langfuse-redis-auth
      NEXTAUTH_SECRET: my-nextauth-secret-for-dev
      SALT: my-salt-for-dev
      ENCRYPTION_KEY: eaa129cd1f5ef95bd12d59fcf56bddb26063fe18e70803d393b00b3512c21f82
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_EVENT_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"
      LANGFUSE_S3_MEDIA_UPLOAD_BUCKET: langfuse
      LANGFUSE_S3_MEDIA_UPLOAD_REGION: us-east-1
      LANGFUSE_S3_MEDIA_UPLOAD_ENDPOINT: http://langfuse-minio:9000
      LANGFUSE_S3_MEDIA_UPLOAD_ACCESS_KEY_ID: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_SECRET_ACCESS_KEY: minioadmin
      LANGFUSE_S3_MEDIA_UPLOAD_FORCE_PATH_STYLE: "true"
    restart: unless-stopped

  langfuse-postgres:
    image: docker.io/postgres:17
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - langfuse-pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  langfuse-redis:
    image: docker.io/redis:7
    command: >
      redis-server
      --requirepass langfuse-redis-auth
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "langfuse-redis-auth", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  langfuse-clickhouse:
    image: docker.io/clickhouse/clickhouse-server
    environment:
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: langfuse
    volumes:
      - langfuse-ch-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  langfuse-minio:
    image: docker.io/minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - langfuse-minio-data:/data
    ports:
      - "9001:9001"   # MinIO console (optional, handy for debugging)
    restart: unless-stopped

  # Creates the S3 bucket on first run, then exits
  langfuse-minio-init:
    image: docker.io/minio/mc
    depends_on:
      - langfuse-minio
    entrypoint: >
      /bin/sh -c "
      until mc alias set myminio http://langfuse-minio:9000 minioadmin minioadmin; do sleep 1; done;
      mc mb --ignore-existing myminio/langfuse;
      exit 0;
      "
    restart: "no"

volumes:
  langfuse-pg-data:
  langfuse-ch-data:
  langfuse-minio-data:
